services:
    neo4j:
        image: neo4j:5.26-community
        restart: unless-stopped
        ports:
            - "${NEO4J_HTTP_PORT}:7474"
            - "${NEO4J_BOLT_PORT}:7687"
        environment:
            - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
            - NEO4J_PLUGINS=${NEO4J_PLUGINS}
            - NEO4J_dbms_memory_heap_initial__size=${NEO4J_HEAP_INITIAL_SIZE}
            - NEO4J_dbms_memory_heap_max__size=${NEO4J_HEAP_MAX_SIZE}
            - NEO4J_dbms_memory_pagecache_size=${NEO4J_PAGECACHE_SIZE}
        volumes:
            - neo4j_data:/data
            - neo4j_logs:/logs
            - neo4j_import:/var/lib/neo4j/import
            - neo4j_plugins:/plugins

    neodash:
        image: nielsdejong/neodash:latest
        restart: unless-stopped
        ports:
            - "${NEODASH_PORT}:5005"
        environment:
            - standalone=${NEODASH_STANDALONE}
            - ssoEnabled=${NEODASH_SSO_ENABLED}
        depends_on:
            - neo4j

volumes:
    neo4j_data:
    neo4j_logs:
    neo4j_import:
    neo4j_plugins:
